<svg xmlns="http://www.w3.org/2000/svg" viewBox="-100 50 200 150">

  <!-- Rectangles in negative coordinate space -->
  <g id="rectangles">
    <rect x="-90" y="10" width="40" height="30" stroke="black" fill="none" />
    <rect x="-40" y="-20" width="60" height="40" stroke="black" fill="none" />
    <rect x="20" y="-40" width="50" height="30" stroke="black" fill="none" />
  </g>

  <!-- In/Out points -->
  <g id="inout">
    <circle cx="-70" cy="0" r="2" data-type="in" />
    <circle cx="40" cy="-20" r="2" data-type="out" />
  </g>

  <!-- Measurement points -->
  <g id="measure-points">
    <circle cx="-50" cy="20" r="1.5" data-measure="1" />
    <circle cx="10" cy="-10" r="1.5" data-measure="1" />
  </g>

  <!-- Measurement line -->
  <g id="measure-lines">
    <line x1="-50" y1="20" x2="10" y2="-10" data-measure="1" />
  </g>

</svg>
