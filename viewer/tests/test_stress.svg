<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -200 200 200">

  <!-- Dense cluster of rectangles -->
  <g id="rectangles">
    <rect x="10" y="-190" width="20" height="20" stroke="black" fill="none" />
    <rect x="25" y="-180" width="20" height="20" stroke="black" fill="none" />
    <rect x="40" y="-170" width="20" height="20" stroke="black" fill="none" />
    <rect x="55" y="-160" width="20" height="20" stroke="black" fill="none" />
    <rect x="70" y="-150" width="20" height="20" stroke="black" fill="none" />
    <rect x="85" y="-140" width="20" height="20" stroke="black" fill="none" />
    <rect x="100" y="-130" width="20" height="20" stroke="black" fill="none" />
    <rect x="115" y="-120" width="20" height="20" stroke="black" fill="none" />
    <rect x="130" y="-110" width="20" height="20" stroke="black" fill="none" />
    <rect x="145" y="-100" width="20" height="20" stroke="black" fill="none" />
  </g>

  <!-- In/Out points -->
  <g id="inout">
    <circle cx="15" cy="-185" r="2" data-type="in" />
    <circle cx="160" cy="-95" r="2" data-type="out" />
  </g>

  <!-- Measurement points -->
  <g id="measure-points">
    <circle cx="30" cy="-150" r="1.5" data-measure="1" />
    <circle cx="140" cy="-120" r="1.5" data-measure="1" />
  </g>

  <!-- Measurement line -->
  <g id="measure-lines">
    <line x1="30" y1="-150" x2="140" y2="-120" data-measure="1" />
  </g>

</svg>
