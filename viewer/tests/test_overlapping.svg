<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -120 200 120">

  <!-- Overlapping rectangles -->
  <g id="rectangles">
    <rect x="20" y="-100" width="80" height="60" stroke="black" fill="none" />
    <rect x="50" y="-90" width="80" height="60" stroke="black" fill="none" />
    <rect x="40" y="-70" width="60" height="40" stroke="black" fill="none" />
  </g>

  <!-- In/Out points -->
  <g id="inout">
    <circle cx="30" cy="-80" r="2" data-type="in" />
    <circle cx="110" cy="-60" r="2" data-type="out" />
  </g>

  <!-- Measurement points -->
  <g id="measure-points">
    <circle cx="40" cy="-50" r="1.5" data-measure="1" />
    <circle cx="120" cy="-40" r="1.5" data-measure="1" />
  </g>

  <!-- Measurement line -->
  <g id="measure-lines">
    <line x1="40" y1="-50" x2="120" y2="-40" data-measure="1" />
  </g>

</svg>
