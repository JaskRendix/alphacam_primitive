<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -100 200 100">

  <!-- Rectangles -->
  <g id="rectangles">
    <rect x="10" y="-90" width="40" height="30" stroke="black" fill="none" />
    <rect x="80" y="-70" width="50" height="40" stroke="black" fill="none" />
    <rect x="150" y="-95" width="30" height="20" stroke="black" fill="none" />
  </g>

  <!-- In/Out points -->
  <g id="inout">
    <circle cx="20" cy="-80" r="2" class="inout-point in-point" data-type="in" />
    <circle cx="45" cy="-65" r="2" class="inout-point out-point" data-type="out" />

    <circle cx="90" cy="-60" r="2" class="inout-point in-point" data-type="in" />
    <circle cx="120" cy="-85" r="2" class="inout-point out-point" data-type="out" />
  </g>

  <!-- Measurement points -->
  <g id="measure-points">
    <circle cx="30" cy="-50" r="1.5" stroke="red" fill="red" data-measure="1" />
    <circle cx="110" cy="-40" r="1.5" stroke="red" fill="red" data-measure="1" />
  </g>

  <!-- Measurement lines -->
  <g id="measure-lines">
    <line x1="30" y1="-50" x2="110" y2="-40"
          stroke="red" stroke-width="1"
          data-measure="1" />
  </g>

</svg>
